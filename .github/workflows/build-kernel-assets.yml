name: Dxgkrnl 构建

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-to-branch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 ExHyperV 仓库
        uses: actions/checkout@v4

      - name: 安装基础工具
        run: sudo apt-get install -y patch git

      - name: 构建驱动压缩包
        run: |
          set -e
          mkdir -p output
          
          # 克隆 Locietta 补丁集
          git clone --depth 1 https://github.com/Locietta/xanmod-kernel-WSL2.git l-patches
          
          VERSIONS=("linux-msft-wsl-5.15.y:5.15:false" "linux-msft-wsl-6.6.y:6.6:false" "linux-msft-wsl-6.6.y:6.12:true")

          for item in "${VERSIONS[@]}"; do
            IFS=':' read -r RAW_VER SHORT_VER USE_LOCIETTA <<< "$item"
            BUILD_DIR="dxgkrnl-${SHORT_VER}-patched"
            echo ">>> [开始构建] 版本: $SHORT_VER"

            # 1. 提取微软官方源码
            rm -rf ms-kernel && mkdir ms-kernel && cd ms-kernel
            git init -q
            git remote add origin https://github.com/microsoft/WSL2-Linux-Kernel.git
            git config core.sparseCheckout true
            echo "drivers/hv/dxgkrnl/" >> .git/info/sparse-checkout
            echo "include/" >> .git/info/sparse-checkout
            git pull --depth 1 origin "$RAW_VER" -q
            cd ..

            # 2. 应用 ExHyperV 本地基础补丁
            LOCAL_PATCH_DIR="src/Linux/script/patches/linux-msft-wsl-6.6.y"
            if [[ "$SHORT_VER" == "5.15" ]]; then
                LOCAL_PATCH_DIR="src/Linux/script/patches/linux-msft-wsl-5.15.y"
            fi

            if [ -d "$LOCAL_PATCH_DIR" ]; then
                echo " -> 应用本地基础补丁 ($LOCAL_PATCH_DIR)"
                cd ms-kernel
                ls ../$LOCAL_PATCH_DIR/*.patch | sort | while read -r p; do
                    patch -p1 < "$p"
                done
                cd ..
            fi

            # 3. 针对高版本执行适配（硬核修复逻辑集成在这里）
            if [[ "$USE_LOCIETTA" == "true" ]]; then
                echo " -> 执行 6.12+ 适配升级..."
                cd ms-kernel
                find ../l-patches/patches -maxdepth 1 -name "*.patch" | grep -iE "dxgkrnl|d3d|fence" | sort | while read -r p; do
                    # 尝试应用补丁，如果失败则记录
                    patch -p1 --ignore-whitespace < "$p" || echo "    [Skip] $(basename "$p")"
                done
                
                # --- 关键修复：解决 6.17 编译报错 ---
                # 修复 GUID：追加到 dxgkrnl.h 尾部，避开系统 hyperv.h 的阴影覆盖
                echo "" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#ifndef HV_GPUP_DXGK_GLOBAL_GUID" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#define HV_GPUP_DXGK_GLOBAL_GUID .guid = GUID_INIT(0xdde9cbc0, 0x5060, 0x4436, 0x94, 0x48, 0xea, 0x12, 0x54, 0xa5, 0xd1, 0x77)" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#endif" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#ifndef HV_GPUP_DXGK_VGPU_GUID" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#define HV_GPUP_DXGK_VGPU_GUID .guid = GUID_INIT(0x6e382d18, 0x3336, 0x4f4b, 0xac, 0xc4, 0x2b, 0x77, 0x03, 0xd4, 0xdf, 0x4a)" >> drivers/hv/dxgkrnl/dxgkrnl.h
                echo "#endif" >> drivers/hv/dxgkrnl/dxgkrnl.h

                # 修复 eventfd_signal 调用：强制将 (ctx, 1) 改为 (ctx)
                sed -i 's/eventfd_signal(\(.*\), 1)/eventfd_signal(\1)/g' drivers/hv/dxgkrnl/dxgmodule.c
                # ----------------------------------
                cd ..
            fi

            # 4. 彻底清理补丁残留（解决 test.py 的 FATAL 报错）
            echo " -> 清理补丁残留文件..."
            find ms-kernel/drivers/hv/dxgkrnl/ -name "*.orig" -delete || true
            find ms-kernel/drivers/hv/dxgkrnl/ -name "*.rej" -delete || true

            # 5. 整理输出结构
            echo " -> 整理输出结构..."
            mkdir -p "$BUILD_DIR/include/linux"
            mkdir -p "$BUILD_DIR/include/uapi/misc"
            cp -r ms-kernel/drivers/hv/dxgkrnl/* "$BUILD_DIR/"
            [ -f ms-kernel/include/linux/hyperv.h ] && cp ms-kernel/include/linux/hyperv.h "$BUILD_DIR/include/linux/"
            [ -f ms-kernel/include/uapi/misc/d3dkmthk.h ] && cp ms-kernel/include/uapi/misc/d3dkmthk.h "$BUILD_DIR/include/uapi/misc/"

            # 6. 打包
            tar -czf "output/${BUILD_DIR}.tar.gz" "$BUILD_DIR"
            echo ">>> [完成] $BUILD_DIR.tar.gz 构建成功"
            rm -rf "$BUILD_DIR" ms-kernel
          done

      - name: 强制推送到独立资源分支
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "自动更新修复版驱动组件 $(date +'%Y-%m-%d %H:%M:%S')"
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:refs/heads/kernel-assets --force
