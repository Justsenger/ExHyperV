name: 构建已打补丁的 DXG 内核组件

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-patch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: "linux-msft-wsl-5.15.y"
            short_ver: "5.15"
          - branch: "linux-msft-wsl-6.6.y"
            short_ver: "6.6"

    steps:
      - name: 检出 ExHyperV 仓库
        uses: actions/checkout@v4

      - name: 稀疏克隆微软内核源码
        run: |
          mkdir ms-kernel
          cd ms-kernel
          git init
          git remote add origin https://github.com/microsoft/WSL2-Linux-Kernel.git
          git config core.sparseCheckout true
          echo "drivers/hv/dxgkrnl/*" >> .git/info/sparse-checkout
          echo "include/*" >> .git/info/sparse-checkout
          git pull --depth 1 origin ${{ matrix.branch }}
          cd ..

      - name: 应用内核补丁
        run: |
          SRC_DIR="ms-kernel"
          PATCH_DIR="src/Linux/script/patches/${{ matrix.branch }}"
          if [ -d "$PATCH_DIR" ]; then
            for patch_file in "$PATCH_DIR"/*.patch; do
              patch -p1 -d "$SRC_ROOT" < "$patch_file"
            done
          fi

      - name: 创建压缩包
        run: |
          BUILD_DIR="dxgkrnl-${{ matrix.short_ver }}-patched"
          mkdir -p "$BUILD_DIR"
          cp -r ms-kernel/drivers/hv/dxgkrnl/* "$BUILD_DIR/"
          cp -r ms-kernel/include "$BUILD_DIR/include"
          tar -czf "${BUILD_DIR}.tar.gz" "$BUILD_DIR"

      - name: 发布资源文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-assets
          files: dxgkrnl-${{ matrix.short_ver }}-patched.tar.gz
          name: "WSL2 内核驱动预制件"
          body: "这是自动构建的已打补丁驱动源码。更新时间：$(date +'%Y-%m-%d %H:%M:%S')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
