name: 构建已打补丁的 DXG 内核组件

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 ExHyperV 仓库
        uses: actions/checkout@v4

      - name: 生成构建时间
        id: date
        run: echo "now=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 构建驱动压缩包
        run: |
          VERSIONS=("linux-msft-wsl-5.15.y:5.15" "linux-msft-wsl-6.6.y:6.6")
          for item in "${VERSIONS[@]}"; do
            BRANCH=${item%%:*}
            SHORT_VER=${item#*:}
            mkdir ms-kernel && cd ms-kernel
            git init -q
            git remote add origin https://github.com/microsoft/WSL2-Linux-Kernel.git
            git config core.sparseCheckout true
            echo "drivers/hv/dxgkrnl/*" >> .git/info/sparse-checkout
            echo "include/*" >> .git/info/sparse-checkout
            git pull --depth 1 origin $BRANCH -q
            cd ..
            PATCH_DIR="src/Linux/script/patches/$BRANCH"
            if [ -d "$PATCH_DIR" ]; then
              for patch_file in "$PATCH_DIR"/*.patch; do
                patch -p1 -d ms-kernel < "$patch_file"
              done
            fi
            BUILD_DIR="dxgkrnl-${SHORT_VER}-patched"
            mkdir -p "$BUILD_DIR"
            cp -r ms-kernel/drivers/hv/dxgkrnl/* "$BUILD_DIR/"
            cp -r ms-kernel/include "$BUILD_DIR/include"
            tar -czf "${BUILD_DIR}.tar.gz" "$BUILD_DIR"
            rm -rf "$BUILD_DIR" ms-kernel
          done

      - name: 发布资源文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-assets
          files: |
            dxgkrnl-5.15-patched.tar.gz
            dxgkrnl-6.6-patched.tar.gz
          name: "WSL2 内核驱动预制组件 (自动构建)"
          body: "此 Release 仅供脚本下载使用。构建时间：${{ steps.date.outputs.now }}"
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
