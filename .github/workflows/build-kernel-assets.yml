name: 构建干净的 DXG 驱动轻量包

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-to-branch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 ExHyperV 仓库
        uses: actions/checkout@v4

      - name: 安装基础工具
        run: sudo apt-get install -y patch git

      - name: 构建驱动压缩包
        run: |
          set -e
          mkdir -p output
          
          # 克隆 Locietta 补丁集 (用于 6.12 及其它潜在参考)
          git clone --depth 1 https://github.com/Locietta/xanmod-kernel-WSL2.git l-patches
          
          # 定义版本： 源码标识 : 包名版本 : 补丁源类型
          # ms = 微软源 + ExHyperV 本地补丁; loc = 主线源 + Locietta 补丁
          VERSIONS=("linux-msft-wsl-5.15.y:5.15:ms" "linux-msft-wsl-6.6.y:6.6:ms" "v6.12:6.12:loc")

          for item in "${VERSIONS[@]}"; do
            IFS=':' read -r RAW_VER SHORT_VER SRC_TYPE <<< "$item"
            BUILD_DIR="dxgkrnl-${SHORT_VER}-patched"
            echo ">>> [PROCESS] Version: $SHORT_VER ($SRC_TYPE)"

            if [[ "$SRC_TYPE" == "ms" ]]; then
                # 1. 微软官方源流程
                rm -rf ms-kernel && mkdir ms-kernel && cd ms-kernel
                git init -q
                git remote add origin https://github.com/microsoft/WSL2-Linux-Kernel.git
                git config core.sparseCheckout true
                echo "drivers/hv/dxgkrnl/" >> .git/info/sparse-checkout
                echo "include/" >> .git/info/sparse-checkout
                git pull --depth 1 origin "$RAW_VER" -q
                cd ..
                
                # 应用本地补丁
                LOCAL_PATCH_DIR="src/Linux/script/patches/linux-msft-wsl-${SHORT_VER}.y"
                if [ -d "$LOCAL_PATCH_DIR" ]; then
                    echo " -> Applying local patches from $LOCAL_PATCH_DIR"
                    cd ms-kernel
                    for p in ../$LOCAL_PATCH_DIR/*.patch; do
                        echo "    Patching: $(basename $p)"
                        patch -p1 < "$p"
                    done
                    cd ..
                fi
            else
                # 2. Locietta / 主线源流程 (6.12)
                git clone --depth 1 --branch "$RAW_VER" https://github.com/torvalds/linux.git ms-kernel
                cd ms-kernel
                echo " -> Auto-applying relevant Locietta patches..."
                # 自动筛选显卡相关补丁
                find ../l-patches/patches -name "*.patch" | grep -iE "dxgkrnl|d3d|fence" | sort | while read -r p; do
                    echo "    Applying: $(basename "$p")"
                    patch -p1 --ignore-whitespace < "$p" || echo "    [Skip] $(basename "$p")"
                done
                cd ..
            fi

            # 3. 统一提取与装箱 (The Packaging Layer)
            echo " -> Extracting files to $BUILD_DIR"
            mkdir -p "$BUILD_DIR/include/linux"
            mkdir -p "$BUILD_DIR/include/uapi/misc"

            # 提取驱动核心代码
            cp -r ms-kernel/drivers/hv/dxgkrnl/* "$BUILD_DIR/"
            
            # 提取关键头文件（这些文件已经在上一步被补丁修改过了）
            # 包含 GUID 定义的 hyperv.h
            if [ -f ms-kernel/include/linux/hyperv.h ]; then
                cp ms-kernel/include/linux/hyperv.h "$BUILD_DIR/include/linux/"
            fi
            # 包含通信协议的 d3dkmthk.h
            if [ -f ms-kernel/include/uapi/misc/d3dkmthk.h ]; then
                cp ms-kernel/include/uapi/misc/d3dkmthk.h "$BUILD_DIR/include/uapi/misc/"
            fi

            # 4. 打包
            tar -czf "output/${BUILD_DIR}.tar.gz" "$BUILD_DIR"
            echo ">>> [SUCCESS] $BUILD_DIR.tar.gz created."
            rm -rf "$BUILD_DIR" ms-kernel
          done

      - name: 强制推送到独立资源分支
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "自动更新预制驱动组件 $(date +'%Y-%m-%d %H:%M:%S')"
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:refs/heads/kernel-assets --force
