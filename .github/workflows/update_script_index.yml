name: Generate Script Index
on:
  push:
    paths:
      - 'src/Linux/script/*.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate JSON
        run: |
          cd src/Linux/script
          echo "[" > index.json
          FIRST=true
          for f in *.sh; do
            if ! grep -q "@Name:" "$f"; then
              continue
            fi

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> index.json
            fi
            
            NAME=$(grep "@Name:" "$f" | cut -d':' -f2- | xargs | sed 's/"/\\"/g')
            DESC=$(grep "@Description:" "$f" | cut -d':' -f2- | xargs | sed 's/"/\\"/g')
            AUTH=$(grep "@Author:" "$f" | cut -d':' -f2- | xargs | sed 's/"/\\"/g')
            VERS=$(grep "@Version:" "$f" | cut -d':' -f2- | xargs | sed 's/"/\\"/g')
            
            echo "  {" >> index.json
            echo "    \"FileName\": \"$f\"," >> index.json
            echo "    \"Name\": \"$NAME\"," >> index.json
            echo "    \"Description\": \"$DESC\"," >> index.json
            echo "    \"Author\": \"${AUTH:-Justsenger}\"," >> index.json
            echo "    \"Version\": \"${VERS:-1.0}\"" >> index.json
            echo "  }" >> index.json
          done
          echo "]" >> index.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "Auto-update script index.json" || exit 0
          git push
