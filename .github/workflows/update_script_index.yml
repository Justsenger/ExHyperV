name: Generate Script Index
on:
  push:
    paths:
      - 'src/Linux/script/*.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate JSON
        run: |
          cd src/Linux/script
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          echo "[]" > index.json
          
          for f in *.sh; do
            if [ ! -f "$f" ] || [ "$f" == "index.json" ] || ! grep -q "@Name:" "$f"; then
              continue
            fi
            
            NAME=$(perl -ne 'if(/@Name:\s*(.*)/){$v=$1;$v=~s/\r//g;$v=~s/^\s+|\s+$//g;print $v}' "$f")
            DESC=$(perl -ne 'if(/@Description:\s*(.*)/){$v=$1;$v=~s/\r//g;$v=~s/^\s+|\s+$//g;print $v}' "$f")
            AUTH=$(perl -ne 'if(/@Author:\s*(.*)/){$v=$1;$v=~s/\r//g;$v=~s/^\s+|\s+$//g;print $v}' "$f")
            VERS=$(perl -ne 'if(/@Version:\s*(.*)/){$v=$1;$v=~s/\r//g;$v=~s/^\s+|\s+$//g;print $v}' "$f")
            
            jq --arg fn "$f" \
               --arg nm "$NAME" \
               --arg ds "$DESC" \
               --arg au "$AUTH" \
               --arg ve "$VERS" \
               '. += [{
                 FileName: $fn, 
                 Name: (if $nm == "" then $fn else $nm end), 
                 Description: $ds, 
                 Author: (if $au == "" then "Justsenger" else $au end), 
                 Version: (if $ve == "" then "1.0.0" else $ve end)
               }]' index.json > index.tmp.json && mv index.tmp.json index.json
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Linux/script/index.json
          git commit -m "Auto-update script index.json" || exit 0
          git pull --rebase origin main
          git push origin main
