name: 发布

on:
  push:
    branches:
      - main
  workflow_dispatch:        # 手动触发：发布（含内测）只能走这里
    inputs:
      release_type:
        description: '发布类型'
        required: true
        type: choice
        options:
          - beta
          - release
        default: beta

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 读取 csproj 版本号，按后缀决定发布渠道 ──────────────────────
      - id: config
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $releaseType = "${{ inputs.release_type }}"

          # 版本号唯一来源：csproj 的 <Version>；发布渠道由手动发布时的选项决定。
          [xml]$project = Get-Content src/ExHyperV.csproj
          $ver = ($project.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1)
          $ver = "$ver".Trim()
          if ([string]::IsNullOrWhiteSpace($ver)) {
            Write-Error "未能从 src/ExHyperV.csproj 读取 <Version>"
            exit 1
          }

          if ($eventName -eq "push") {
            # push 只做构建验证，不签名、不创建 Tag/Release。
            $mode = "build"
            $tag = ""
            $pre = "false"
            $winget = "false"
            $build = "true"
            $publish = "false"
          } else {
            if ($releaseType -eq "beta") {
              $mode = "beta"
              $tag = "V$ver-beta"
              $pre = "true"
              $winget = "false"
            } elseif ($releaseType -eq "release") {
              $mode = "release"
              $tag = "V$ver"
              $pre = "false"
              $winget = "true"
            } else {
              Write-Error "未知发布类型：$releaseType"
              exit 1
            }

            # 已存在相同 Tag 时安全跳过，避免覆盖已经发布的版本。
            git ls-remote --exit-code --tags origin "refs/tags/$tag" | Out-Null
            $tagCheck = $LASTEXITCODE
            if ($tagCheck -eq 0) {
              Write-Host "Tag $tag 已存在，本次不构建、不签名、不发布。"
              $build = "false"
              $publish = "false"
            } elseif ($tagCheck -eq 2) {
              $build = "true"
              $publish = "true"
            } else {
              Write-Error "检查远程 Tag 失败（git ls-remote 退出码：$tagCheck），为避免覆盖发布，本次终止。"
              exit 1
            }
          }

          echo "MODE=$mode"       >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver"     >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"         >> $env:GITHUB_OUTPUT
          echo "PRERELEASE=$pre"  >> $env:GITHUB_OUTPUT
          echo "WINGET=$winget"   >> $env:GITHUB_OUTPUT
          echo "BUILD=$build"     >> $env:GITHUB_OUTPUT
          echo "PUBLISH=$publish" >> $env:GITHUB_OUTPUT
          Write-Host "版本=$ver  模式=$mode  Tag=$tag  构建=$build  发布=$publish  Winget=$winget"

      # ── 构建 ─────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        if: steps.config.outputs.BUILD == 'true'
        with:
          dotnet-version: '8.0.x'

      - name: Build x64 and arm64
        if: steps.config.outputs.BUILD == 'true'
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          $publishRoot = Join-Path $PWD "artifacts"
          & $msbuild src/ExHyperV.csproj /t:PublishAllArchitectures /p:PublishRoot="$publishRoot"

      # ── 签名：安装 SimplySign Desktop ────────────────────────────────
      - name: Setup Certum Code Signing
        if: steps.config.outputs.PUBLISH == 'true'
        shell: bash
        run: |
          chmod +x ./.github/scripts/install-simplysign.sh
          ./.github/scripts/install-simplysign.sh
          powershell -ExecutionPolicy Bypass -File "./.github/scripts/configure-simplysign-registry.ps1"
        continue-on-error: true

      # ── 签名：认证 SimplySign ─────────────────────────────────────────
      - name: Authenticate Certum
        if: steps.config.outputs.PUBLISH == 'true'
        shell: bash
        env:
          CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
          CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
          CERTUM_EXE_PATH: ${{ secrets.CERTUM_EXE_PATH }}
        run: |
          for attempt in $(seq 1 10); do
            echo "Authentication attempt ${attempt}/10"
            if powershell -ExecutionPolicy Bypass -File "./.github/scripts/connect-simplySign-enhanced.ps1"; then
              echo "Authentication completed"
              exit 0
            fi
            [ "$attempt" -lt 10 ] && sleep 10
          done
          echo "ERROR: Certum authentication failed after 10 attempts"
          exit 1
        continue-on-error: true

      # ── 签名：x64 EXE ────────────────────────────────────────────────
      - name: Sign x64 EXE
        if: steps.config.outputs.PUBLISH == 'true'
        shell: pwsh
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: |
          Start-Sleep -Seconds 10
          powershell -ExecutionPolicy Bypass -File "./.github/scripts/sign-windows.ps1" -TargetDirectory "artifacts/win-x64" -SkipCatGeneration

      # ── 签名：arm64 EXE ───────────────────────────────────────────────
      - name: Sign arm64 EXE
        if: steps.config.outputs.PUBLISH == 'true'
        shell: pwsh
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: |
          powershell -ExecutionPolicy Bypass -File "./.github/scripts/sign-windows.ps1" -TargetDirectory "artifacts/win-arm64" -SkipCatGeneration

      # ── 整理单文件发布资产 ────────────────────────────────────────────
      - name: Prepare release assets
        if: steps.config.outputs.PUBLISH == 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.config.outputs.TAG }}"
          Copy-Item ./artifacts/win-x64/ExHyperV.exe "ExHyperV_${tag}_x64.exe"
          Copy-Item ./artifacts/win-arm64/ExHyperV.exe "ExHyperV_${tag}_arm64.exe"

      # ── 预发布：先删掉所有现存预发布，再创建新的 → 内测包始终只保留一个 ──
      - name: Delete all existing prereleases
        if: steps.config.outputs.PUBLISH == 'true' && steps.config.outputs.PRERELEASE == 'true'
        shell: bash
        run: |
          # 列出所有预发布（不含正式版），逐个删除其 Release 和 tag
          gh release list --limit 1000 --json tagName,isPrerelease --jq '.[] | select(.isPrerelease) | .tagName' | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting old prerelease: $tag"
            gh release delete "$tag" --yes 2>/dev/null || true
            git push origin ":refs/tags/$tag" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.config.outputs.PUBLISH == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.config.outputs.TAG }}"
          name: "${{ steps.config.outputs.TAG }}"
          files: |
            ExHyperV_${{ steps.config.outputs.TAG }}_x64.exe
            ExHyperV_${{ steps.config.outputs.TAG }}_arm64.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.config.outputs.PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 提交 Winget（仅正式版，且必须是手动触发）──────────────────────
      - name: Submit to Winget
        if: steps.config.outputs.PUBLISH == 'true' && steps.config.outputs.WINGET == 'true'
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Justsenger.ExHyperV
          installers-regex: '^ExHyperV_V.+_(x64|arm64)\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
          version: ${{ steps.config.outputs.VERSION }}
          release-tag: ${{ steps.config.outputs.TAG }}
